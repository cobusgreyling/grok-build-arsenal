name: Validate Skills and MCPs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validation deps
        run: pip install pyyaml
      - name: Validate all SKILL.md frontmatter
        run: python scripts/validate-skills.py
      - name: Check MCP READMEs exist
        run: |
          for d in mcps/*/; do
            if [ ! -f "${d}README.md" ]; then
              echo "Missing README.md in $d"
              exit 1
            fi
          done
          echo "All MCPs have READMEs"

      - name: Validate installer script (dry-run)
        run: |
          bash scripts/install-skills.sh --dry-run
          echo "Installer dry-run OK"

      - name: Sanity check templates have basic .grok structure
        run: |
          for t in templates/*/; do
            if [ -f "${t}README.md" ]; then
              echo "Template $(basename $t) has README"
            fi
          done
          echo "Template structure looks sane"
